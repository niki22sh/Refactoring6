name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx --yes eslint src/ tests/ --ext .js || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: ./node_modules/.bin/jest --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t employee-app:${{ github.sha }} .

      - name: Run app smoke test
        run: |
          docker run --rm employee-app:${{ github.sha }} node -e "
            const EmployeeRepository = require('./src/repositories/EmployeeRepository');
            const EmployeeService = require('./src/services/EmployeeService');
            const EmployeeDTO = require('./src/dto/EmployeeDTO');
            const repo = new EmployeeRepository();
            const svc = new EmployeeService(repo);
            const emp = svc.registerEmployee(new EmployeeDTO('Test', 'IT', 1000));
            if (emp.name !== 'Test') process.exit(1);
            console.log('Smoke test passed');
          "